<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>


        @keyframes rippleEffect {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        /* 1. LAYOUT & WORLD */
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        
        #game-world {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;   /* Centers the map vertically when zoomed out */
            justify-content: center; /* Centers the map horizontally when zoomed out */
            background: #1a1a1a; /* Dark background for the viewport */
            box-sizing: border-box;
            overflow: hidden;
            cursor: crosshair;
            pointer-events: auto; /* ADD THIS - Ensure clicks are captured */
            z-index: 1; /* ADD THIS - Lower than ui-layer */
        }

        #game-canvas {
            position: absolute;
            width: 2000px;  /* Your terrain size - adjust as needed */
            height: 2000px; /* Your terrain size - adjust as needed */
            top: 0;
            left: 0;
            background: #2d5a27; /* Grass green */
            border: 8px solid #8B4513;  /* ADD THIS */
            box-sizing: border-box;     /* ADD THIS */
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 99px, rgba(255,255,255,0.1) 99px, rgba(255,255,255,0.1) 100px),
                repeating-linear-gradient(90deg, transparent, transparent 99px, rgba(255,255,255,0.1) 99px, rgba(255,255,255,0.1) 100px);
            /* ^ Grid lines every 100px for terrain placement */
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }


/* 2. THE PLAYER */
        .soldier {
            position: absolute;
            width: 16px;
            height: 24px;
            background: #556B2F; 
            border: 2px solid #2F4F4F;
            border-radius: 2px;
            z-index: 100;
            box-shadow: 2px 4px 5px rgba(0,0,0,0.3);
            will-change: left, top; /* Performance optimization */
        }

        .unit {
            position: absolute;
            width: 16px;
            height: 24px;
            background: #4169E1; /* Royal blue for allies */
            border: 2px solid #1E3A8A;
            border-radius: 2px;
            z-index: 100;
            box-shadow: 2px 4px 5px rgba(0,0,0,0.3);
            will-change: left, top;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        #player::before {
        content: var(--current-shield); /* Set by JavaScript */
        position: absolute;
        /* We put the shield on the left side (-12px) */
        left: -8px; 
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        pointer-events: none;
        }

        #player::after {
        content: var(--current-weapon);/* This will be filled by JS */
        position: absolute;
        left: 10px;   /* Puts it to the right of the 16px player */
        top: 50%;
        transform: translateY(-50%) scaleY(var(--flip, 1));
        font-size: 14px;
        pointer-events: none; /* So it doesn't interfere with clicks */
        white-space: nowrap;
        }

        .unit::after {
        content: var(--current-weapon);
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%) scaleY(var(--flip, 1));
        font-size: 10px; /* Slightly smaller for allies */
        }

        /* Range circle for Bow mode */
        #range-indicator {
            position: absolute;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
        }

        /* 3. UI OVERLAY */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 1000;
        }

        .resource-panel {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(42, 42, 42, 0.9);
            border: 2px solid #666;
            padding: 8px 15px;
            color: #FFD700;
            font-weight: bold;
            border-radius: 4px;
        }

        .character-card {
            position: absolute;
            bottom: 20px; left: 20px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border: 2px solid #4a4a4a;
            border-radius: 8px;
            pointer-events: auto; /* Let clicks happen here */
        }

        .weapon-box {
            width: 54px; height: 54px;
            background: #333;
            border: 2px solid #8B4513;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .weapon-box:active { transform: scale(0.9); }

        .armor-box {
            width: 54px; height: 54px;
            background: #333;
            border: 2px solid #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .stat-line {
            color: #eee;
            font-size: 11px;
            margin-top: 3px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        #stat-dodge { color: #5dade2; } /* Light blue for dodge */
        #stat-dmg { color: #f1948a; }   /* Light red for damage */
        #stat-arm { color: #f7dc6f; }   /* Yellow for armor */

        .armor-box:active { transform: scale(0.9); }

        .stats-container { width: 140px; }
        .name-tag { color: white; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }

        .hp-bar-bg {
            width: 100%; height: 10px;
            background: #222;
            border: 1px solid #000;
            border-radius: 2px;
        }

        #hp-fill {
            width: 100%; height: 100%;
            background: #DC143C; /* Crimson */
            transition: width 0.3s ease;
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 14px;
            z-index: 200;
            animation: floatUp 1s ease-out forwards;
        }

        /* REPLACE .enemy-hp-bg, .enemy-hp-fill, .ally-hp-bg, .ally-hp-fill with these: */
        .hp-bg {
            position: absolute;
            top: -10px;
            left: -2px;
            width: 20px;
            height: 4px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #000;
            border-radius: 2px;
        }
        .hp-bar {
            height: 100%;
            background: #ff3333;
            width: 100%;
            transition: width 0.2s ease;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .text-miss { color: #aaa; }
        .text-hit  { color: #fff; }
        .text-crit { color: #ffcc00; font-size: 18px; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }





    </style>

function renderTerrain(terrainZones) {
    // Clear old terrain
    document.querySelectorAll('.terrain-zone').forEach(el => el.remove());
    currentTerrain = terrainZones || [];
    
    // Draw new terrain
    currentTerrain.forEach(zone => {
        const terrainData = TerrainDatabase[zone.type];
        if (!terrainData) return;
        
        const el = document.createElement('div');
        el.className = 'terrain-zone';
        el.style.cssText = `
            position: absolute;
            left: ${zone.x}px;
            top: ${zone.y}px;
            width: ${zone.width}px;
            height: ${zone.height}px;
            background: ${terrainData.color};
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
        `;
        canvas.appendChild(el);
    });
}

function getTerrainAt(x, y) {
    for (let zone of currentTerrain) {
        if (x >= zone.x && x <= zone.x + zone.width &&
            y >= zone.y && y <= zone.y + zone.height) {
            return zone.type;
        }
    }
    return 'grass'; // Default terrain
}

function getTerrainSpeedMult(x, y) {
    const terrainType = getTerrainAt(x, y);
    return TerrainDatabase[terrainType]?.speedMult || 1;
}

// --- IMPROVED INPUT HANDLING ---
function handleInput(e) {
    const rect = world.getBoundingClientRect();
    
    // 1. Resolve coordinates safely
    let clientX, clientY;
    
    if (e.type.startsWith('touch')) {
        // If it's the end of a touch, we use changedTouches
        // Otherwise (touchstart/move), we use touches
        const touch = e.changedTouches ? e.changedTouches[0] : e.touches[0];
        clientX = touch.clientX;
        clientY = touch.clientY;
    } else {
        // It's a MouseEvent
        clientX = e.clientX;
        clientY = e.clientY;
    }

    // 2. Translate screen pixels to map coordinates
    const worldX = ((clientX - rect.left) / camera.zoom) + camera.x;
    const worldY = ((clientY - rect.top) / camera.zoom) + camera.y;

    console.log(`Commanding Hero to: ${Math.round(worldX)}, ${Math.round(worldY)}`);

    // 3. Update the gameState target
    // Note: I subtracted 8 and 12 so the hero's CENTER goes to your finger
    gameState.target.x = worldX - 8; 
    gameState.target.y = worldY - 12; 
}

// 1. TOUCH START: Record where the finger first landed
world.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        // Single finger: potentially a tap or a scroll
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isDragging = false; 
    } else if (e.touches.length === 2) {
        // Two fingers: Starting a pinch
        lastTouchDist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
    }
}, { passive: false });

// 2. TOUCH MOVE: Handle the actual scrolling/zooming
world.addEventListener('touchmove', (e) => {
    e.preventDefault(); // Stop the phone from "bouncing" the webpage

    if (e.touches.length === 1) {
        // --- ONE FINGER SCROLLING ---
        const currentX = e.touches[0].clientX;
        const currentY = e.touches[0].clientY;
        
        const dx = touchStartX - currentX;
        const dy = touchStartY - currentY;

        // Threshold: If moved > 5px, it's a scroll, not a tap
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            isDragging = true;
            camera.x += dx / camera.zoom;
            camera.y += dy / camera.zoom;
            
            // Update start points so the scroll is smooth
            touchStartX = currentX;
            touchStartY = currentY;
            updateCamera();
        }
    } else if (e.touches.length === 2) {
        // --- TWO FINGER PINCH ZOOM ---
        isDragging = true; // Prevent hero from moving after a pinch
        const dist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        
        // Adjust zoom based on finger spread
        const zoomDelta = (dist - lastTouchDist) * 0.005; 
        camera.zoom = Math.max(0.5, Math.min(3, camera.zoom + zoomDelta));
        lastTouchDist = dist;
        updateCamera();
    }
}, { passive: false });

// 3. TOUCH END: The "Decision Maker"
world.addEventListener('touchend', (e) => {
    // If the finger stayed relatively still, treat it as a command to move the Hero
    if (!isDragging && e.changedTouches.length === 1) {
        // Use the first touch point that was just released
        handleInput(e.changedTouches[0]);
    }
});

        updateScenarioButtons();
    }



    // Clear existing enemies only (keep allies from shop)
    enemies.forEach(e => e.element.remove());
    enemies.length = 0;

    // Render terrain FIRST
    renderTerrain(scenario.terrain);

    // Move player to bottom center
    gameState.pos.x = camera.worldWidth / 2 - 8;
    gameState.pos.y = camera.worldHeight - 100;
    gameState.target.x = gameState.pos.x;
    gameState.target.y = gameState.pos.y;

    // Move existing allies near player
    allies.forEach((ally, i) => {
        ally.pos.x = gameState.pos.x - 40 + (i * 40);
        ally.pos.y = gameState.pos.y - 30;
        ally.element.style.left = ally.pos.x + 'px';
        ally.element.style.top = ally.pos.y + 'px';
    });

    // Spawn enemies at top
    const enemyY = 50;
    const spacing = Math.min(100, camera.worldWidth / (scenario.enemies.length + 1));
    scenario.enemies.forEach((cfg, i) => {
        const x = spacing * (i + 1);
        spawnEnemy('footman', x, enemyY, cfg.weapon, cfg.armor, cfg.shield);

    camera.x = Math.max(0, gameState.pos.x - window.innerWidth / (2 * camera.zoom));

}

function enforceWorldBounds() {
    const margin = 10;
    const maxX = camera.worldWidth - 26;  // Use canvas width, not window width
    const maxY = camera.worldHeight - 34; // Use canvas height, not window height
    
    // Clamp player
    gameState.pos.x = Math.max(margin, Math.min(gameState.pos.x, maxX));
    gameState.pos.y = Math.max(margin, Math.min(gameState.pos.y, maxY));
    gameState.target.x = Math.max(margin, Math.min(gameState.target.x, maxX));
    gameState.target.y = Math.max(margin, Math.min(gameState.target.y, maxY));
    
    // Clamp all AI units
    [...enemies, ...allies].forEach(unit => {
        unit.pos.x = Math.max(margin, Math.min(unit.pos.x, maxX));
        unit.pos.y = Math.max(margin, Math.min(unit.pos.y, maxY));
    });
}


function updateCamera() {
    // 1. Calculate the 'world units' visible on the screen at the current zoom
    const viewW = window.innerWidth / camera.zoom;
    const viewH = window.innerHeight / camera.zoom;

    // 2. Set your 'No Man's Land' buffer (the dark area around the grass)
    // Increase this to 800 or 1000 if you want even more 'desk space' around the map
    const buffer = 800; 

    // 3. Define the total scrollable boundaries (Map Size + Buffer)
    const minX = -buffer;
    const minY = -buffer;
    const maxX = 2000 + buffer - viewW;
    const maxY = 2000 + buffer - viewH;

    // 4. Apply Constraints
    // If the map is smaller than the screen (zoomed way out), 
    // we allow it to sit in the negative space comfortably.
    camera.x = Math.max(minX, Math.min(maxX, camera.x));
    camera.y = Math.max(minY, Math.min(maxY, camera.y));

    // 5. Render the Transform
    // We use translate first to move the 'camera' to the world coordinates,
    // then scale everything up/down.
    canvas.style.transform = `scale(${camera.zoom}) translate(${-camera.x}px, ${-camera.y}px)`;
}

    const wpn = WeaponDatabase[weaponKey];
    if (!wpn || !wpn.oneHanded) return 'none'; // ranged/two-handed get no shield
    const shields = Object.keys(ShieldDatabase);
    return shields[Math.floor(Math.random() * shields.length)];
}

function applyArmorStats() {
    const armor = ArmorDatabase[gameState.currentArmor];
    if (!armor) return;

    const shield = ShieldDatabase[gameState.currentShield] || ShieldDatabase['none'];
    const weapon = WeaponDatabase[gameState.currentWeapon];
    
    // Calculate stats
    gameState.speed = Math.max(0.5, (gameState.baseSpeed * armor.speedMult * (1 + weapon.moveMod)) - shield.speedPenalty);
    gameState.dodge = Math.max(0, gameState.baseDodge - armor.dodgePenalty - shield.dodgePenalty);

    // Update Player Sprite Colors
    const colors = {
        'none': { bg: '#556B2F', bd: '#2F4F4F' },
        'leather armor': { bg: '#8b4513', bd: '#5d2e0a' },
        'chainmail': { bg: '#95a5a6', bd: '#2c3e50' },
        'platemail': { bg: '#bdc3c7', bd: '#7f8c8d' }
    }[gameState.currentArmor];

    player.style.background = colors.bg;
    player.style.border = `2px solid ${colors.bd}`;
    
    // --- SHIELD VISUAL UPDATE ---

    player.style.setProperty('--current-shield', `"${shield.icon}"`);
    
    // Update armor icon on button

            // Assuming allies have an 'hp' and 'maxHp' property
            // If they don't have maxHp yet, we'll assume 100
            const maxHp = ally.maxHp || 100;
            ally.hp = Math.min(maxHp, ally.hp + healAmount);
            
            // Update the ally's small health bar on the map
            if (ally.hpBarElement) {
                const percent = (ally.hp / maxHp) * 100;
                ally.hpBarElement.style.width = percent + '%';
            }
        });

        console.log("The army has rested. HP restored!");
    } else {
        alert("Not enough gold to rest in the village!");
    }
    updateUI();
    updateArmyRoster()
}

function equipWeapon(weaponKey) {

    if (price && gameState.gold < price) {
        alert(`Not enough gold! Need ${price}, have ${gameState.gold}`);

    if (isHero) {

        applyArmorStats(); // Hero-specific visual/stat refresh
    } else {
        target.weapon = weaponKey;

            applyArmorStats();

            target.shield = 'none';

    selectSoldier(selectedSoldierIndex);

function getHitResult(weaponKey, distance, targetDodge, targetArmorKey = 'none', targetShieldKey = 'none') {
    const wpn = WeaponDatabase[weaponKey];
    const armor = ArmorDatabase[targetArmorKey];
    const shield = ShieldDatabase[targetShieldKey] || ShieldDatabase['none']; 
    const bracket = wpn.brackets.find(b => distance >= b.min && distance <= b.max);
    
    let baseMiss = bracket ? bracket.missChance : 100;
    const shieldBonus = (shield.missBonus[weaponKey] || 0) * 100; // convert 0.1 → 10%
    let totalMiss = (baseMiss < 100) ? Math.min(baseMiss + targetDodge + shieldBonus, 65) : 100;

    console.log(`%c🎲 ATTACK ROLL [${weaponKey} vs ${targetArmorKey} + ${targetShieldKey} shield]`, 'color: #aaa; font-weight: bold');
    console.log(`   📏 Distance: ${Math.round(distance)}px | Bracket: ${bracket ? bracket.min+'-'+bracket.max : 'none'}`);
    console.log(`   🎯 Miss: ${baseMiss}% base + ${targetDodge}% dodge + ${shieldBonus}% shield = ${totalMiss}% (cap 65%)`);
    
    if (Math.random() * 100 < totalMiss) {
        console.log(`   ❌ MISSED`);
        return { type: "MISS", damage: 0 };
    }

    let isCrit = Math.random() * 100 < wpn.critChance;
    let rawDmg = isCrit ? wpn.crit : wpn.damage;
    let multiplier = armor.reduction[weaponKey] || 1.0;
    let finalDmg = Math.round(rawDmg * multiplier);

    console.log(`   ⚔️  Raw damage: ${rawDmg} (${isCrit ? 'CRIT' : 'normal'}) × ${multiplier} armor = %c${finalDmg} damage`, 'color: #ff6b6b; font-weight: bold');

    console.log(`   ⚔️  Raw: ${rawDmg} (${isCrit ? 'CRIT' : 'normal'}) × ${multiplier} armor = %c${finalDmg}`, 'color: #ff6b6b; font-weight: bold');
    return { type: isCrit ? "CRIT" : "HIT", damage: finalDmg };
}

function handleAutoAttack() {
    if (enemies.length === 0) return;

    let closestEnemy = null;
    let minDistance = Infinity;

    // 1. Find the nearest target
    enemies.forEach(en => {
        const dx = en.pos.x - (gameState.pos.x + 8);
        const dy = en.pos.y - (gameState.pos.y + 12);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDistance) {
            minDistance = dist;
            closestEnemy = en;
        }
    });

    if (closestEnemy) {
        const now = Date.now();
        const weapon = WeaponDatabase[gameState.currentWeapon];
        
        // 2. FIND THE SPECIFIC BRACKET
        const bracket = weapon.brackets.find(b => minDistance >= b.min && minDistance <= b.max);

        // 3. THE "INTELLIGENT SWING" CHECK
        // Only attack if we found a bracket AND it's not a 100% miss zone
        const canActuallyHit = bracket && bracket.missChance < 100;

        if (canActuallyHit && (now - gameState.lastAttack > weapon.speed)) {
            
            const result = getHitResult(gameState.currentWeapon, minDistance, closestEnemy.dodge, closestEnemy.armor || 'none', closestEnemy.shield || 'none');
            if (weapon.isRanged) {
                spawnArrow(gameState.pos.x + 8, gameState.pos.y + 12, closestEnemy.pos.x + 8, closestEnemy.pos.y + 12, true, result);
            } else {
                // MELEE: Show the result over the ENEMY
                if (result.type === "MISS") {
                    showFloatingText(closestEnemy.pos.x, closestEnemy.pos.y - 20, "MISS", "miss");
                } else {
                    closestEnemy.hp -= result.damage;
                    const label = result.type === "CRIT" ? `CRIT! -${result.damage}` : `-${result.damage}`;
                    showFloatingText(closestEnemy.pos.x, closestEnemy.pos.y - 20, label, result.type);
                    
                    if (closestEnemy.hpFill) {
                        const pct = Math.max(0, (closestEnemy.hp / closestEnemy.maxHp) * 100);
                        closestEnemy.hpFill.style.width = pct + '%';
                    }
                }
            }
            
            // RESET PLAYER TIMER
            gameState.lastAttack = now;
        }
    }
}

function applyCombatResult(target, result) {
    // 1. Apply the damage
    target.hp -= result.damage;
    
    // 2. Show floating text (Crit vs Normal)
    const label = result.type === "CRIT" ? `CRIT! -${result.damage}` : `-${result.damage}`;
    showFloatingText(target.pos.x, target.pos.y - 20, label, result.type);

    // 3. Update the red HP bar width
    // We assume max HP is 100 based on your setup
    const hpPercent = Math.max(0, (target.hp / 100) * 100);
    if (target.hpFill) {
        target.hpFill.style.width = hpPercent + "%";
    }

    // 4. Check for Death
    if (target.hp <= 0) {
        target.element.remove();
        const index = enemies.indexOf(target);
        if (index > -1) enemies.splice(index, 1);
        
        gameState.gold += 20; // Bounty for the kill
        updateUI(); // Refresh gold display
    }
}

function handleCollisions() {
    const radius = 12;
    const minDist = radius * 2;
    
    // Create a combined list of all AI units
    const allUnits = [...enemies, ...allies];

    allUnits.forEach((u1, i) => {
        // 1. Check against Player (Player is immovable)
        const pdx = u1.pos.x - gameState.pos.x;
        const pdy = u1.pos.y - gameState.pos.y;
        const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
        
        if (pDist < minDist && pDist > 0) {
            const pOverlap = minDist - pDist;
            u1.pos.x += (pdx / pDist) * pOverlap;
            u1.pos.y += (pdy / pDist) * pOverlap;
        }

        // 2. Check against other AI units (Enemies AND Allies)
        for (let j = i + 1; j < allUnits.length; j++) {
            const u2 = allUnits[j];
            const dx = u2.pos.x - u1.pos.x;
            const dy = u2.pos.y - u1.pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < minDist && dist > 0) {
                const overlap = minDist - dist;
                const nx = dx / dist;
                const ny = dy / dist;
                
                // Equal push-back for both units
                u1.pos.x -= nx * (overlap / 2);
                u1.pos.y -= ny * (overlap / 2);
                u2.pos.x += nx * (overlap / 2);
                u2.pos.y += ny * (overlap / 2);
            }
        }
    });
}


function spawnArrow(fromX, fromY, toX, toY, isPlayer, result) {
    // If no result was passed, WE HAVE A PROBLEM. 
    // Let's force a result check here just in case.
    if (!result) {
        console.warn("Arrow spawned without a combat result!");
        return; 
    }

    const arrow = document.createElement('div');
    const color = isPlayer ? '#FFD700' : 'white';
    arrow.style.cssText = `position:absolute; width:4px; height:4px; background:${color}; border-radius:50%; z-index:90; pointer-events:none;`; 
    // ^ Added pointer-events:none so the arrows don't block clicks
    
    canvas.appendChild(arrow);
    
    const dx = toX - fromX;
    const dy = toY - fromY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    projectiles.push({
        element: arrow,
        pos: { x: fromX, y: fromY },
        vel: { x: (dx/dist) * 8, y: (dy/dist) * 8 },
        life: 200,
        isPlayer: isPlayer,
        result: result 
    });
}



function getPlayerSpeed() {
    const baseSpeed = 5; // Or whatever your starting speed is
    const weapon = WeaponDatabase[gameState.currentWeapon];
    const shield = ShieldDatabase[gameState.currentShield];
    const armor = ArmorDatabase[gameState.currentArmor];

    // Formula: (Base - Weapon - Shield) * ArmorMultiplier
    const rawSpeed = baseSpeed - (weapon.weight || 0) - (shield.speedPenalty || 0);
    const finalSpeed = rawSpeed * (armor.speedMultiplier || 1);

    return Math.max(0.5, finalSpeed); // Ensure they don't move at 0 speed!
}

    // --- CORE LOGIC ---

function tryAllyAttack(ally, enemy, distance, weapon) {
    const now = Date.now();
    const bracket = weapon.brackets.find(b => distance >= b.min && distance <= b.max);
    
    if (bracket && (now - (ally.lastAttack || 0) > weapon.speed)) {
        const result = getHitResult(ally.weapon, distance, enemy.dodge, enemy.armor || 'none', enemy.shield || 'none');
        if (weapon.isRanged) {
            spawnArrow(ally.pos.x + 8, ally.pos.y + 12, enemy.pos.x + 8, enemy.pos.y + 12, true, result);
        } else {
            if (result.type !== "MISS") {
                enemy.hp -= result.damage;
                showFloatingText(enemy.pos.x, enemy.pos.y - 20, `-${result.damage}`, result.type);
            } else {
                showFloatingText(enemy.pos.x, enemy.pos.y - 20, "MISS", "miss");
            }
        }
        ally.lastAttack = now;
    }
}

function updateUI() {
    const weapon = WeaponDatabase[gameState.currentWeapon];
    const armor = ArmorDatabase[gameState.currentArmor];
    const shield = ShieldDatabase[gameState.currentShield];

    const currentSpeed = Number(gameState.speed).toFixed(1);
    const currentDodge = gameState.dodge;

    if (!weapon) return;

    // ... (Icon and Color code)
    
    if (weaponBtn) weaponBtn.innerText = weapon.icon;
    if (armorBtn) armorBtn.innerText = armor.icon;
    if (player) player.style.backgroundColor = weapon.color;
    if (goldDisplay) goldDisplay.innerText = `💰 ${gameState.gold}`;
    if (hpFill) hpFill.style.width = gameState.hp + "%";

    document.getElementById('stat-speed').innerText = currentSpeed;
    document.getElementById('stat-dodge').innerText = currentDodge;
    document.getElementById('stat-shield').innerText = gameState.currentShield;

    document.getElementById('stat-dmg').innerText = `${weapon.damage}-${weapon.crit}`;
    document.getElementById('stat-arm').innerText = gameState.currentArmor;


    player.style.setProperty('--current-shield', `"${shield.icon}"`);
    player.style.setProperty('--current-weapon', `"${weapon.icon}"`);
    const flipVal = weapon.flip ? -1 : 1;
    player.style.setProperty('--flip', flipVal);

    // FIND THE OPTIMAL BRACKET
    let optimalBracket = weapon.brackets.reduce((prev, current) => {
        return (prev.missChance < current.missChance) ? prev : current;
    });

    let displayRange = optimalBracket.max;
    if (displayRange >= 9999) displayRange = optimalBracket.min;

    if (displayRange > 0) {
        rangeCircle.style.display = 'block';
        
        // 1. Set the size (Diameter)
        rangeCircle.style.width = (displayRange * 2) + 'px';
        rangeCircle.style.height = (displayRange * 2) + 'px';
        
        // 2. The Secret Sauce: Centering
        // We move the circle LEFT and UP by the radius to center it
        // The +8 and +12 align it to the character's visual center
        //rangeCircle.style.left = '50%'; 
        //rangeCircle.style.top = '50%';
        //rangeCircle.style.transform = 'translate(-50%, -50%)';
        
        // Update border color based on how good the miss chance is
        const intensity = 255 - (optimalBracket.missChance * 2);
        rangeCircle.style.borderColor = `rgba(0, ${intensity}, 0, 0.6)`; 
    } else {
        rangeCircle.style.display = 'none';
    }
}

// --- UPDATED GAME LOOP ---
function gameLoop() {
    // 1. MOVE PLAYER
    const pDx = gameState.target.x - gameState.pos.x;
    const pDy = gameState.target.y - gameState.pos.y;
    const pDist = Math.sqrt(pDx * pDx + pDy * pDy);

    if (pDist > gameState.speed) {
        const terrainMult = getTerrainSpeedMult(gameState.pos.x, gameState.pos.y);
        const effectiveSpeed = gameState.speed * terrainMult;
        gameState.pos.x += (pDx / pDist) * effectiveSpeed;
        gameState.pos.y += (pDy / pDist) * effectiveSpeed;
    } else {
        gameState.pos.x = gameState.target.x;
        gameState.pos.y = gameState.target.y;
    }

    player.style.left = gameState.pos.x + 'px';
    player.style.top = gameState.pos.y + 'px';
    rangeCircle.style.left = (gameState.pos.x + 8) + 'px';
    rangeCircle.style.top = (gameState.pos.y + 12) + 'px';

    // 2. MOVE ALLIES & ALLY ATTACKS
    allies.forEach(ally => {
        const weapon = WeaponDatabase[ally.weapon];
        if (!weapon) return;

        let closestEnemy = null;
        let shortestDist = Infinity;

        enemies.forEach(enemy => {
            const dx = enemy.pos.x - ally.pos.x;
            const dy = enemy.pos.y - ally.pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < shortestDist) {
                shortestDist = dist;
                closestEnemy = enemy;
            }
        });

        const terrainMult = getTerrainSpeedMult(ally.pos.x, ally.pos.y);

        // COMMAND-FIRST LOGIC
        if (currentCommand === 'FOLLOW') {
            const pdx = gameState.pos.x - ally.pos.x;
            const pdy = gameState.pos.y - ally.pos.y;
            const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
            if (pDist > 40) {
                ally.pos.x += (pdx / pDist) * ally.speed * terrainMult;
                ally.pos.y += (pdy / pDist) * ally.speed * terrainMult;
            }
            // Still attack enemies that get close
            if (closestEnemy && shortestDist < 150) {
                tryAllyAttack(ally, closestEnemy, shortestDist, weapon);
            }
            
        } else if (currentCommand === 'CHARGE') {
            // Attack enemies aggressively
            if (closestEnemy) {
                const edx = closestEnemy.pos.x - ally.pos.x;
                const edy = closestEnemy.pos.y - ally.pos.y;
                const bestBracket = weapon.brackets.reduce((prev, curr) => 
                    (curr.missChance < prev.missChance) ? curr : prev
                );
                const stopDist = bestBracket.max > 1000 ? bestBracket.min + 20 : bestBracket.max - 5;
                
                if (shortestDist > stopDist) {
                    ally.pos.x += (edx / shortestDist) * ally.speed * terrainMult;
                    ally.pos.y += (edy / shortestDist) * ally.speed * terrainMult;
                }
                tryAllyAttack(ally, closestEnemy, shortestDist, weapon);
            }
            
        } else if (currentCommand === 'STAND') {
            // Don't move, but attack enemies in range
            if (closestEnemy) {
                tryAllyAttack(ally, closestEnemy, shortestDist, weapon);
            }
            
        } else if (currentCommand === 'RETREAT') {
            // Run to bottom-left, ignore enemies
            const targetX = 50;
            const targetY = camera.worldHeight - 50;
            const dx = targetX - ally.pos.x;
            const dy = targetY - ally.pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 30) {
                ally.pos.x += (dx / dist) * ally.speed * terrainMult;
                ally.pos.y += (dy / dist) * ally.speed * terrainMult;
            }
        }

        ally.element.style.left = ally.pos.x + 'px';
        ally.element.style.top = ally.pos.y + 'px';
    });

    // 3. PLAYER AUTO-ATTACK
    handleAutoAttack();

    // 4. UPDATE ENEMIES
    enemies.forEach((enemy) => {
        const weapon = WeaponDatabase[enemy.weapon];
        if (!weapon) return;

        let targetPos = { x: gameState.pos.x, y: gameState.pos.y };
        let targetType = 'player';
        let targetRef = null;
        
        let dx = gameState.pos.x - enemy.pos.x;
        let dy = gameState.pos.y - enemy.pos.y;
        let minDist = Math.sqrt(dx * dx + dy * dy);

        allies.forEach(ally => {
            const adx = ally.pos.x - enemy.pos.x;
            const ady = ally.pos.y - enemy.pos.y;
            const aDist = Math.sqrt(adx * adx + ady * ady);
            if (aDist < minDist) {
                minDist = aDist;
                targetPos = { x: ally.pos.x, y: ally.pos.y };
                targetType = 'ally';
                targetRef = ally;
            }
        });

        const bestBracket = weapon.brackets.reduce((prev, curr) => (curr.missChance < prev.missChance) ? curr : prev);
        const stopDist = bestBracket.max - 5;

        if (minDist > stopDist) {
            const terrainMult = getTerrainSpeedMult(enemy.pos.x, enemy.pos.y);
            const speed = enemy.speed * terrainMult;
            enemy.pos.x += ((targetPos.x - enemy.pos.x) / minDist) * speed;
            enemy.pos.y += ((targetPos.y - enemy.pos.y) / minDist) * speed;
        }

        handleCollisions();
        enforceWorldBounds();
        enemy.element.style.left = enemy.pos.x + 'px';
        enemy.element.style.top = enemy.pos.y + 'px';

// ... inside enemies.forEach ...
        const now = Date.now();
        const currentBracket = weapon.brackets.find(b => minDist >= b.min && minDist <= b.max);

        if (currentBracket && currentBracket.missChance < 100 && (now - (enemy.lastAttack || 0) > weapon.speed)) {
            
            // --- THE FIX: Define these two variables first ---
            const targetDodge = (targetType === 'player') ? gameState.dodge : (targetRef.dodge || 20);
            const targetArmor = (targetType === 'player') ? gameState.currentArmor : (targetRef.armor || 'none');
            const targetShield = (targetType === 'player') ? gameState.currentShield : (targetRef.shield || 'none');

            // --- NOW this line will stop crashing ---
            const result = getHitResult(enemy.weapon, minDist, targetDodge, targetArmor, targetShield);

            if (weapon.isRanged) {
                spawnArrow(enemy.pos.x + 8, enemy.pos.y + 12, targetPos.x + 8, targetPos.y + 12, false, result);
            } else {
                if (result.type !== "MISS") {
                    if (targetType === 'player') {
                        applyAttackToPlayer(result);
                    } else {
                        targetRef.hp -= result.damage;
                        if (targetRef.hpFill) {
                            const pct = Math.max(0, (targetRef.hp / targetRef.maxHp) * 100);
                            targetRef.hpFill.style.width = pct + '%';
                        }
                        showFloatingText(targetRef.pos.x, targetRef.pos.y - 20, `-${result.damage}`, result.type);
                    }
                } else {
                    showFloatingText(targetPos.x, targetPos.y - 20, "MISS", "miss");
                }
            }
            enemy.lastAttack = now;
        }
    });

    // 5. UPDATE PROJECTILES
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        proj.pos.x += proj.vel.x;
        proj.pos.y += proj.vel.y;
        proj.element.style.left = proj.pos.x + 'px';
        proj.element.style.top = proj.pos.y + 'px';
        proj.life--;

        if (proj.isPlayer) {
            // Player arrow hitting enemies
            for (let j = enemies.length - 1; j >= 0; j--) {
                const en = enemies[j];
                const d = Math.sqrt(Math.pow(proj.pos.x - (en.pos.x + 8), 2) + Math.pow(proj.pos.y - (en.pos.y + 12), 2));
                if (d < 15) {
                    if (proj.result.type !== "MISS") applyCombatResult(en, proj.result);
                    else showFloatingText(en.pos.x, en.pos.y - 20, "MISS", "miss");
                    proj.life = 0;
                    break; 
                }
            }
        } else {
            // Enemy arrow hitting Player OR Allies
            let hitTarget = null;
            const distToPlayer = Math.sqrt(Math.pow(proj.pos.x - (gameState.pos.x + 8), 2) + Math.pow(proj.pos.y - (gameState.pos.y + 12), 2));
            
            if (distToPlayer < 12) {
                hitTarget = { type: 'player' };
            } else {
                for (let ally of allies) {
                    const d = Math.sqrt(Math.pow(proj.pos.x - (ally.pos.x + 8), 2) + Math.pow(proj.pos.y - (ally.pos.y + 12), 2));
                    if (d < 12) {
                        hitTarget = { type: 'ally', ref: ally };
                        break;
                    }
                }
            }

            if (hitTarget) {
                if (proj.result.type !== "MISS") {
                    if (hitTarget.type === 'player') {
                        gameState.hp -= proj.result.damage;
                        updateUI();
                    } else {
                        hitTarget.ref.hp -= proj.result.damage;
                        showFloatingText(hitTarget.ref.pos.x, hitTarget.ref.pos.y - 20, `-${proj.result.damage}`, proj.result.type);
                    }
                } else {
                    const showX = hitTarget.type === 'player' ? gameState.pos.x : hitTarget.ref.pos.x;
                    const showY = hitTarget.type === 'player' ? gameState.pos.y : hitTarget.ref.pos.y;
                    showFloatingText(showX, showY - 20, "MISS", "miss");
                }
                proj.life = 0;
            }
        }

        if (proj.life <= 0) {
            proj.element.remove();
            projectiles.splice(i, 1);
        }
    }

    // 6. FINAL CLEANUP
    if (gameState.hp <= 0) {
        alert("You fell in battle!");
        location.reload();
        return;
    }

    // Remove Dead Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        if (enemies[i].hp <= 0) {
            enemies[i].element.remove(); 
            enemies.splice(i, 1);
        }
    }

    // Remove Dead Allies
    for (let i = allies.length - 1; i >= 0; i--) {
        if (allies[i].hp <= 0) {
            allies[i].element.remove(); 
            allies.splice(i, 1);
        }
    }
    updateShopAvailability();
    requestAnimationFrame(gameLoop);
}

// Initialize
updateUI();
gameLoop();
